name: kairos-local

services:
  kairos-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kairos-api
    restart: unless-stopped
    # Uncomment to load configurations from a local .env file:
    # env_file:
    #   - .env
    environment:
      APP_NAME: Kairos API
      APP_VERSION: 3.4.0
      APP_ENV: ${APP_ENV:-development}
      API_V1_PREFIX: /api/v1
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/kairos-local.sqlite3}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000","http://127.0.0.1:3000","https://kairosos.xyz","https://www.kairosos.xyz"]'}
      CREATE_TABLES_ON_STARTUP: "true"
      USE_MOCK_DATA: "false"
      N8N_WEBHOOK_TRIGGER_ENABLED: ${N8N_WEBHOOK_TRIGGER_ENABLED:-false}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_WEBHOOK_TIMEOUT_SECONDS: ${N8N_WEBHOOK_TIMEOUT_SECONDS:-10}
      KAIROS_OLLAMA_READINESS_ENABLED: ${KAIROS_OLLAMA_READINESS_ENABLED:-true}
      KAIROS_OLLAMA_BASE_URL: ${KAIROS_OLLAMA_BASE_URL:-http://localhost:11434}
      KAIROS_OLLAMA_TAGS_PATH: ${KAIROS_OLLAMA_TAGS_PATH:-/api/tags}
      KAIROS_OLLAMA_TIMEOUT_SECONDS: ${KAIROS_OLLAMA_TIMEOUT_SECONDS:-2}
      KAIROS_OLLAMA_DISPATCH_ENABLED: ${KAIROS_OLLAMA_DISPATCH_ENABLED:-false}
      KAIROS_OLLAMA_GENERATE_PATH: ${KAIROS_OLLAMA_GENERATE_PATH:-/api/generate}
      KAIROS_OLLAMA_REQUEST_TIMEOUT_SECONDS: ${KAIROS_OLLAMA_REQUEST_TIMEOUT_SECONDS:-30}
      KAIROS_OLLAMA_MAX_PROMPT_CHARS: ${KAIROS_OLLAMA_MAX_PROMPT_CHARS:-12000}
      KAIROS_OLLAMA_MAX_RESPONSE_CHARS: ${KAIROS_OLLAMA_MAX_RESPONSE_CHARS:-8000}
      # AI Provider Credentials (optional — providers appear as Not Configured when unset)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KAIROS_DEEPSEEK_API_KEY: ${KAIROS_DEEPSEEK_API_KEY:-}
      KAIROS_9ROUTER_API_KEY: ${KAIROS_9ROUTER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      KAIROS_OPENROUTER_API_KEY: ${KAIROS_OPENROUTER_API_KEY:-}
      KAIROS_AI_BASE_URL: ${KAIROS_AI_BASE_URL:-https://openrouter.ai/api/v1}
      KAIROS_AI_MODEL: ${KAIROS_AI_MODEL:-anthropic/claude-sonnet-4}
      # KAIROS_API_KEY: "your-secure-api-key-here" # Enable local API key auth (unset/empty for local dev)
      UVICORN_PROXY_HEADERS: "true"
      UVICORN_FORWARDED_ALLOW_IPS: "*"
      # ROOT_PATH: "/api-subpath" # Mount API on a subpath if using reverse proxy routing
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"
    volumes:
      # Standard volume mapping for Zima OS / Direct Docker Compose
      - ./data:/app/data
      - kairos_tmp:/tmp
      # Portainer Stack mapping (if using Portainer stack deploy, uncomment below and Named Volumes block at bottom)
      # - kairos_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kairos-dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KAIROS_API_URL: ${NEXT_PUBLIC_KAIROS_API_URL:-http://localhost:8000}
    container_name: kairos-dashboard
    restart: unless-stopped
    # Uncomment to load configurations from a local .env file:
    # env_file:
    #   - .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_KAIROS_API_URL: ${NEXT_PUBLIC_KAIROS_API_URL:-http://localhost:8000}
      # NEXT_PUBLIC_KAIROS_API_KEY: "your-secure-api-key-here" # Must match KAIROS_API_KEY if enabled
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  codex-runtime:
    build:
      context: ./infra/codex-runtime
      dockerfile: Dockerfile
    container_name: codex-runtime
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - kairos_tmp:/tmp
      - codex_session:/root/.codex
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kairos-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-""}
    depends_on:
      - kairos-api
      - kairos-dashboard
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kairos_tmp:
    name: kairos_tmp
  codex_session:
    name: codex_session
